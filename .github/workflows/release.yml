name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install FrontlineEconomy dependency
        run: |
          git clone https://github.com/1tzArad/FrontlineEconomy.git /tmp/FrontlineEconomy
          mvn -B install -DskipTests -f /tmp/FrontlineEconomy/pom.xml

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: target/BorderAndFrontlines-*.jar
